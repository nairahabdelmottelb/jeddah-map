<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jeddah Upper Canal 2026 — Traffic Validation Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --bg-page: #1A1A2E;
      --bg-panel: #16213E;
      --border-dim: rgba(179, 176, 173, 0.25);
      --border: #B3B0AD;
      --text-pri: #F3F2F1;
      --text-sec: #B3B0AD;
      --accent: #118DFF;
      --good: #197278;
      --warn: #D9B300;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-pri);
    }

    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-dim);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-pri);
    }

    #header p {
      font-size: 11px;
      color: var(--text-sec);
      margin-top: 2px;
    }

    #filters {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      z-index: 999;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-dim);
      padding: 7px 20px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    #filters label {
      font-size: 11px;
      color: var(--text-sec);
      margin-right: 2px;
    }

    .fbtn {
      padding: 4px 12px;
      border-radius: 3px;
      border: 1px solid var(--border-dim);
      background: transparent;
      color: var(--text-sec);
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .fbtn:hover {
      border-color: var(--border);
      color: var(--text-pri);
    }

    .fbtn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .fsep {
      width: 1px;
      height: 18px;
      background: var(--border-dim);
      margin: 0 4px;
    }

    #map {
      position: fixed;
      top: 84px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 1000;
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 11px;
      min-width: 190px;
    }

    #legend h3 {
      font-size: 10px;
      color: var(--text-sec);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .lr {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 6px;
    }

    .ld {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ls {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .ll {
      width: 22px;
      height: 2px;
      flex-shrink: 0;
      background: repeating-linear-gradient(90deg, #B3B0AD 0 5px, transparent 5px 8px);
    }

    .lt {
      color: var(--text-sec);
      font-size: 11px;
    }

    .lsep {
      border-top: 1px solid var(--border-dim);
      margin: 8px 0;
    }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border-dim) !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .5) !important;
      padding: 0 !important;
      max-width: 580px !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      max-width: 580px;
    }

    .leaflet-popup-tip {
      background: var(--bg-panel) !important;
    }

    .leaflet-popup-close-button {
      color: #B3B0AD !important;
      font-size: 18px !important;
      top: 8px !important;
      right: 10px !important;
    }

    .pb {
      padding: 14px 16px;
      min-width: 420px;
    }

    .pt {
      font-size: 15px;
      font-weight: 600;
      color: #F3F2F1;
      margin-bottom: 2px;
    }

    .ps {
      font-size: 11px;
      color: #B3B0AD;
      margin-bottom: 10px;
    }

    /* band header */
    .bh {
      font-size: 10px;
      font-weight: 600;
      color: #118DFF;
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 7px 0 4px;
      border-top: 1px solid rgba(179, 176, 173, .2);
      margin-top: 6px;
    }

    /* peak hour summary row */
    .pk-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 10px;
      background: rgba(179, 176, 173, .07);
      border-radius: 3px;
      padding: 5px 8px;
      margin-bottom: 5px;
      font-size: 11px;
    }

    .pk-lbl {
      color: #B3B0AD;
      font-size: 10px;
    }

    .pk-val {
      color: #F3F2F1;
      font-weight: 600;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .pk-warn {
      color: #D9B300 !important;
    }

    /* check table */
    .pt2 {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-bottom: 2px;
    }

    .pt2 th {
      color: #B3B0AD;
      font-weight: 600;
      padding: 3px 6px;
      text-align: left;
      border-bottom: 1px solid rgba(179, 176, 173, .2);
      white-space: nowrap;
    }

    .pt2 td {
      color: #F3F2F1;
      padding: 3px 6px;
      border-bottom: 1px solid rgba(179, 176, 173, .07);
    }

    .pt2 tr:last-child td {
      border-bottom: none;
    }

    .tc {
      text-align: center !important;
    }

    .tr {
      text-align: right !important;
      font-variant-numeric: tabular-nums;
    }

    .sv {
      display: inline-block;
      color: #fff;
      padding: 1px 6px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 600;
      white-space: nowrap;
    }

    .atc-tip {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border) !important;
      color: var(--text-pri) !important;
      font-weight: 600;
      font-size: 11px;
      padding: 3px 8px !important;
      border-radius: 3px !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .4) !important;
    }

    .atc-tip::before {
      display: none !important;
    }
  </style>
</head>
