<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jeddah Upper Canal 2026 — Validation Map</title>
<style>
:root{
  --bg:#0A0F18;--panel:#161B22;--border:rgba(179,176,173,0.2);
  --bs:#B3B0AD;--text:#F3F2F1;--muted:#8B949E;--accent:#118DFF;
}
html,body{
  margin:0;padding:0;width:100%;height:100%;
  font-family:'Segoe UI',system-ui,Arial,sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;overflow:hidden;
}
#hdr{
  flex-shrink:0;
  background:var(--panel);border-bottom:1px solid var(--border);
  padding:0 12px;height:42px;
  display:flex;align-items:center;justify-content:space-between;
}
#hdr h1{font-size:11px;font-weight:600;letter-spacing:.2px}
#hdr p{font-size:8px;color:var(--muted);margin-top:1px}
#bar{
  flex-shrink:0;
  background:var(--panel);border-bottom:1px solid var(--border);
  padding:4px 12px;display:flex;gap:4px;align-items:center;flex-wrap:wrap;
}
#bar label{font-size:9px;color:var(--muted);margin-right:1px}
.b{
  padding:2px 8px;border-radius:3px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:9px;
  cursor:pointer;font-family:inherit;transition:all .12s;
}
.b:hover{border-color:var(--bs);color:var(--text)}
.b.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.sp{width:1px;height:14px;background:var(--border);margin:0 2px}
#wrap{
  position:relative;flex:1;min-height:0;overflow:hidden;
}
#cv{display:block;cursor:grab;width:100%;height:100%}
#cv:active{cursor:grabbing}

#tt{
  position:absolute;display:none;pointer-events:none;
  background:var(--panel);border:1px solid var(--border);
  border-radius:4px;box-shadow:0 6px 24px rgba(0,0,0,.7);
  max-width:480px;min-width:320px;z-index:200;overflow:hidden;
}
.th{padding:9px 12px 5px;border-bottom:1px solid var(--border)}
.tn{font-size:13px;font-weight:600;color:var(--text)}
.ts{font-size:9px;color:var(--muted);margin-top:1px}
.tb{padding:4px 12px 10px;max-height:300px;overflow-y:auto}
.bh{font-size:8px;font-weight:700;color:var(--accent);text-transform:uppercase;
    letter-spacing:.8px;padding:5px 0 2px;
    border-top:1px solid var(--border);margin-top:3px}
.pk{display:flex;flex-wrap:wrap;gap:2px 7px;
    background:rgba(255,255,255,.04);border-radius:3px;
    padding:3px 6px;margin-bottom:3px;font-size:9px}
.pl{color:var(--muted)}.pv{color:var(--text);font-weight:600}.pw{color:#D9B300!important}
table.ct{width:100%;border-collapse:collapse;font-size:9px}
table.ct th{color:var(--muted);font-weight:600;padding:2px 4px;text-align:left;
            border-bottom:1px solid var(--border);white-space:nowrap}
table.ct td{color:var(--text);padding:2px 4px;
            border-bottom:1px solid rgba(255,255,255,.04)}
table.ct tr:last-child td{border-bottom:none}
.tc{text-align:center!important}.tr{text-align:right!important;font-variant-numeric:tabular-nums}
.sv{display:inline-block;color:#fff;padding:1px 4px;border-radius:2px;
    font-size:7px;font-weight:700;white-space:nowrap}
#leg{
  position:absolute;bottom:12px;left:12px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:4px;padding:8px 12px;font-size:9px;min-width:160px;
}
#leg h3{font-size:8px;color:var(--muted);font-weight:700;
        text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lsq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.ll{width:18px;height:2px;flex-shrink:0;
    background:repeating-linear-gradient(90deg,#B3B0AD 0 4px,transparent 4px 7px)}
.lt{color:var(--muted)}
.lsp{border-top:1px solid var(--border);margin:5px 0}
#zc{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:3px}
.zb{width:24px;height:24px;background:var(--panel);
    border:1px solid var(--border);border-radius:3px;
    color:var(--text);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:inherit;line-height:1}
.zb:hover{background:#1C2840}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>Jeddah Upper Canal 2026 — Traffic Count Validation Map</h1>
    <p>02-Feb-2026 &nbsp;&middot;&nbsp; AM 06:00–08:45 &nbsp;&middot;&nbsp; MD 12:00–13:45 &nbsp;&middot;&nbsp; PM 16:00–22:45 &nbsp;&middot;&nbsp; Peak hour = TMC reference</p>
  </div>
</div>

<div id="bar">
  <label>Severity:</label>
  <button class="b on" onclick="setSev(this,'ALL')">All</button>
  <button class="b" onclick="setSev(this,'Good')">Good</button>
  <button class="b" onclick="setSev(this,'Acceptable')">Acceptable</button>
  <button class="b" onclick="setSev(this,'Review')">Review</button>
  <div class="sp"></div>
  <label>Layers:</label>
  <button class="b on" onclick="togL(this,'atc')">ATC nodes</button>
  <button class="b on" onclick="togL(this,'tmc')">TMC nodes</button>
  <button class="b on" onclick="togL(this,'conn')">Connections</button>
</div>

<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="tt"></div>
  <div id="leg">
    <h3>Legend</h3>
    <div class="lr"><div class="ld" style="background:#197278"></div><span class="lt">Good (&Delta;&le;10%)</span></div>
    <div class="lr"><div class="ld" style="background:#D9B300"></div><span class="lt">Acceptable (&Delta;&le;25%)</span></div>
    <div class="lr"><div class="ld" style="background:#D64554"></div><span class="lt">Review (&Delta;&gt;25%)</span></div>
    <div class="lr"><div class="ld" style="background:#605E5C"></div><span class="lt">No ATC data</span></div>
    <div class="lsp"></div>
    <div class="lr"><div class="lsq" style="background:#12239E"></div><span class="lt">TMC junction</span></div>
    <div class="lr"><div class="ll"></div><span class="lt">Road connection</span></div>
  </div>
  <div id="zc">
    <button class="zb" onclick="doZoom(1.25)">+</button>
    <button class="zb" onclick="doZoom(0.8)">&minus;</button>
    <button class="zb" onclick="resetV()" title="Reset" style="font-size:10px">&#8635;</button>
  </div>
</div>

const LINKS=[{"from": [21.78506, 39.13693], "to": [21.78711, 39.14559]}, {"from": [21.78711, 39.14559], "to": [21.78752, 39.15498]}, {"from": [21.76759, 39.15615], "to": [21.7781, 39.15378]}, {"from": [21.7781, 39.15378], "to": [21.78752, 39.15498]}, {"from": [21.78752, 39.15498], "to": [21.77873, 39.17111]}, {"from": [21.77873, 39.17111], "to": [21.77382, 39.1739]}, {"from": [21.76753, 39.14439], "to": [21.77296, 39.14744]}, {"from": [21.77296, 39.14744], "to": [21.78752, 39.15498]}, {"from": [21.76545, 39.14991], "to": [21.76686, 39.15442]}, {"from": [21.76686, 39.15442], "to": [21.76759, 39.15615]}, {"from": [21.78506, 39.13693], "to": [21.78969, 39.12888]}, {"from": [21.72046, 39.1301], "to": [21.72266, 39.13599]}, {"from": [21.72266, 39.13599], "to": [21.73236, 39.14778]}, {"from": [21.75331, 39.16145], "to": [21.74959, 39.15796]}, {"from": [21.74959, 39.15796], "to": [21.73236, 39.14778]}, {"from": [21.72514, 39.15682], "to": [21.72992, 39.1708]}, {"from": [21.72992, 39.1708], "to": [21.73585, 39.189]}, {"from": [21.73615, 39.12294], "to": [21.73362, 39.12201]}, {"from": [21.73362, 39.12201], "to": [21.72046, 39.1301]}, {"from": [21.75506, 39.12179], "to": [21.7472, 39.11268]}, {"from": [21.73236, 39.14778], "to": [21.74828, 39.14911]}, {"from": [21.76101, 39.17967], "to": [21.76829, 39.19065]}, {"from": [21.70787, 39.10354], "to": [21.70168, 39.11621]}, {"from": [21.70787, 39.10354], "to": [21.69982, 39.10663]}, {"from": [21.73585, 39.189], "to": [21.71718, 39.1967]}, {"from": [21.75484, 39.13438], "to": [21.74824, 39.133]}, {"from": [21.74824, 39.133], "to": [21.74164, 39.13162]}];
const ROADS=[{"c": "#1E2D45", "w": 5, "p": [[21.792, 39.12], [21.7897, 39.1289], [21.7875, 39.137], [21.7851, 39.1498], [21.7781, 39.1538], [21.773, 39.1562], [21.7676, 39.1562], [21.7655, 39.1544], [21.763, 39.149], [21.76, 39.146], [21.755, 39.14]]}, {"c": "#1E2D45", "w": 5, "p": [[21.792, 39.12], [21.79, 39.137], [21.7871, 39.1456], [21.781, 39.1538], [21.773, 39.1562]]}, {"c": "#1E2D45", "w": 5, "p": [[21.755, 39.14], [21.75, 39.142], [21.7445, 39.131], [21.736, 39.122], [21.725, 39.12], [21.7172, 39.1967]]}, {"c": "#1C2840", "w": 4, "p": [[21.7897, 39.1289], [21.785, 39.135], [21.78, 39.135], [21.773, 39.144], [21.7676, 39.1454], [21.7655, 39.14]]}, {"c": "#1C2840", "w": 4, "p": [[21.7875, 39.1498], [21.781, 39.1538], [21.773, 39.1562], [21.7676, 39.1562], [21.763, 39.149], [21.755, 39.149]]}, {"c": "#1C2840", "w": 4, "p": [[21.765, 39.135], [21.7665, 39.1499], [21.768, 39.155], [21.7676, 39.1615], [21.765, 39.17]]}, {"c": "#1C2840", "w": 3, "p": [[21.76, 39.105], [21.7551, 39.1218], [21.7472, 39.1127], [21.74, 39.11], [21.72, 39.11], [21.6998, 39.1066]]}, {"c": "#1C2840", "w": 4, "p": [[21.7227, 39.13], [21.7235, 39.136], [21.7253, 39.1478], [21.7297, 39.157], [21.733, 39.168], [21.736, 39.189], [21.74, 39.196], [21.7172, 39.1967]]}, {"c": "#1C2840", "w": 3, "p": [[21.7362, 39.122], [21.7362, 39.1229], [21.7337, 39.1229]]}, {"c": "#1C2840", "w": 3, "p": [[21.71, 39.1035], [21.7079, 39.1066], [21.6998, 39.1066], [21.695, 39.1066], [21.69, 39.11]]}, {"c": "#1C2840", "w": 3, "p": [[21.72, 39.185], [21.7172, 39.1967], [21.71, 39.2]]}];

const SEV_COL={
  Good:'#197278',Acceptable:'#D9B300',Review:'#D64554',
  'No ATC':'#605E5C','No TMC':'#444441',tmc:'#12239E'
};

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const wrap=document.getElementById('wrap');
const tt=document.getElementById('tt');

const FLAT=21.686, FLATX=21.800;
const FLON=39.088, FLONX=39.214;

let sc=1,ox=0,oy=0;
let drag=false,dx=0,dy=0,didDrag=false;
let layers={atc:true,tmc:true,conn:true};
let sevF='ALL';

function toXY(lat,lon){
  const W=cv.width,H=cv.height;
  const x=ox+((lon-FLON)/(FLONX-FLON))*W*sc;
  const y=oy+((FLATX-lat)/(FLATX-FLAT))*H*sc;
  return[x,y];
}

function resize(){
  // Use the wrap element's actual rendered size
  const r=wrap.getBoundingClientRect();
  cv.width=Math.max(r.width,100);
  cv.height=Math.max(r.height,100);
  draw();
}

function resetV(){sc=1;ox=0;oy=0;draw();}
function doZoom(f){
  const cx=cv.width/2,cy=cv.height/2;
  ox=cx-f*(cx-ox);oy=cy-f*(cy-oy);sc*=f;draw();
}

function draw(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0A0F18';ctx.fillRect(0,0,W,H);

  // Roads
  ROADS.forEach(seg=>{
    const pts=seg.p.map(([la,lo])=>toXY(la,lo));
    if(pts.length<2)return;
    ctx.save();
    // Casing
    ctx.strokeStyle='#050810';
    ctx.lineWidth=(seg.w+2.5)*Math.min(sc*0.8+0.3,1.8);
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(([x,y])=>ctx.lineTo(x,y));ctx.stroke();
    // Fill
    ctx.strokeStyle=seg.c;
    ctx.lineWidth=seg.w*Math.min(sc*0.8+0.3,1.8);
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(([x,y])=>ctx.lineTo(x,y));ctx.stroke();
    ctx.restore();
  });

  // Connections
  if(layers.conn){
    LINKS.forEach(lk=>{
      const[x1,y1]=toXY(lk.from[0],lk.from[1]);
      const[x2,y2]=toXY(lk.to[0],lk.to[1]);
      ctx.save();
      ctx.strokeStyle='#B3B0AD';ctx.globalAlpha=0.45;
      ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      const ax=x1+0.6*(x2-x1),ay=y1+0.6*(y2-y1);
      const ang=Math.atan2(y2-y1,x2-x1);
      ctx.setLineDash([]);ctx.globalAlpha=0.55;ctx.fillStyle='#B3B0AD';
      ctx.translate(ax,ay);ctx.rotate(ang);
      ctx.beginPath();ctx.moveTo(5,0);ctx.lineTo(-4,-3);ctx.lineTo(-4,3);
      ctx.closePath();ctx.fill();
      ctx.restore();
    });
  }

  // Nodes
  NODES.forEach(nd=>{
    if(nd.type==='atc'&&!layers.atc)return;
    if(nd.type==='tmc'&&!layers.tmc)return;
    if(sevF!=='ALL'&&nd.type==='atc'&&nd.severity!==sevF)return;
    const[x,y]=toXY(nd.lat,nd.lon);
    const col=SEV_COL[nd.severity]||'#605E5C';
    const isATC=nd.type==='atc';
    const r=(isATC?7:4.5)*Math.min(sc*0.85+0.15,1.7);
    ctx.save();
    if(isATC){
      ctx.shadowColor=col;ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(x,y,r*0.32,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.fill();
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1.2;ctx.stroke();
    }else{
      ctx.shadowColor=col;ctx.shadowBlur=5;
      ctx.fillStyle=col;ctx.fillRect(x-r,y-r,r*2,r*2);ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;
      ctx.strokeRect(x-r,y-r,r*2,r*2);
    }
    ctx.restore();
    if(sc>0.75){
      const fs=Math.round(Math.min(9*sc,12));
      ctx.font=`${isATC?'600 ':''}${fs}px Segoe UI,Arial`;
      ctx.textAlign='center';
      ctx.fillStyle='rgba(0,0,0,0.65)';
      ctx.fillText(nd.id,x+1,y-r-2+1);
      ctx.fillStyle=isATC?'#F3F2F1':'#8B949E';
      ctx.fillText(nd.id,x,y-r-2);
    }
  });
}

function hit(px,py){
  let best=null,bd=Infinity;
  NODES.forEach(nd=>{
    if(nd.type==='atc'&&!layers.atc)return;
    if(nd.type==='tmc'&&!layers.tmc)return;
    const[x,y]=toXY(nd.lat,nd.lon);
    const d=Math.hypot(px-x,py-y);
    const r=nd.type==='atc'?14:9;
    if(d<r&&d<bd){bd=d;best=nd;}
  });
  return best;
}

function showTT(nd,px,py){
  if(!nd.popup){tt.style.display='none';return;}
  tt.innerHTML=nd.popup;
  tt.style.display='block';
  const W=wrap.clientWidth,H=wrap.clientHeight;
  const tw=tt.offsetWidth||380,th=tt.offsetHeight||260;
  let tx=px+14,ty=py-th/2;
  if(tx+tw>W-6)tx=px-tw-14;
  if(ty<4)ty=4;
  if(ty+th>H-4)ty=H-th-4;
  tt.style.left=tx+'px';tt.style.top=ty+'px';
}
function hideTT(){tt.style.display='none';}

cv.addEventListener('mousedown',e=>{drag=true;didDrag=false;dx=e.clientX;dy=e.clientY;});
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  const px=e.clientX-r.left,py=e.clientY-r.top;
  if(drag){
    const mx=e.clientX-dx,my=e.clientY-dy;
    if(Math.abs(mx)+Math.abs(my)>3)didDrag=true;
    ox+=mx;oy+=my;dx=e.clientX;dy=e.clientY;draw();hideTT();return;
  }
  const nd=hit(px,py);
  if(nd){cv.style.cursor='pointer';showTT(nd,px,py);}
  else{cv.style.cursor='grab';hideTT();}
});
cv.addEventListener('mouseup',e=>{
  if(!didDrag){
    const r=cv.getBoundingClientRect();
    const nd=hit(e.clientX-r.left,e.clientY-r.top);
    if(nd)showTT(nd,e.clientX-r.left,e.clientY-r.top);
  }
  drag=false;
});
cv.addEventListener('mouseleave',()=>{drag=false;hideTT();});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:0.89;
  ox=mx-f*(mx-ox);oy=my-f*(my-oy);sc*=f;draw();
},{passive:false});

let ltp=[];
cv.addEventListener('touchstart',e=>{
  ltp=Array.from(e.touches).map(t=>({x:t.clientX,y:t.clientY}));
  if(ltp.length===1){drag=true;didDrag=false;dx=ltp[0].x;dy=ltp[0].y;}
},{passive:true});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const tp=Array.from(e.touches).map(t=>({x:t.clientX,y:t.clientY}));
  if(tp.length===1&&drag){
    const mx=tp[0].x-dx,my=tp[0].y-dy;
    if(Math.abs(mx)+Math.abs(my)>3)didDrag=true;
    ox+=mx;oy+=my;dx=tp[0].x;dy=tp[0].y;draw();
  }
  if(tp.length===2&&ltp.length===2){
    const d1=Math.hypot(ltp[0].x-ltp[1].x,ltp[0].y-ltp[1].y);
    const d2=Math.hypot(tp[0].x-tp[1].x,tp[0].y-tp[1].y);
    const f=d2/d1;
    const cx=(tp[0].x+tp[1].x)/2,cy=(tp[0].y+tp[1].y)/2;
    const rect=cv.getBoundingClientRect();
    ox=(cx-rect.left)-f*((cx-rect.left)-ox);
    oy=(cy-rect.top)-f*((cy-rect.top)-oy);sc*=f;draw();
  }
  ltp=tp;
},{passive:false});
cv.addEventListener('touchend',()=>{drag=false;});

function setSev(btn,val){
  sevF=val;
  document.querySelectorAll('#bar .b').forEach(b=>{
    if(['All','Good','Acceptable','Review'].includes(b.textContent))
      b.classList.toggle('on',b.textContent===val||(val==='ALL'&&b.textContent==='All'));
  });
  draw();
}
function togL(btn,l){
  layers[l]=!layers[l];btn.classList.toggle('on',layers[l]);draw();
}

// Use ResizeObserver so canvas fills wrap exactly as Power BI resizes it
const ro=new ResizeObserver(()=>resize());
ro.observe(wrap);
resize();
